<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#1c1c1e" media="(prefers-color-scheme: dark)" />

<!-- Google Analytics 4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=GA_MEASUREMENT_ID"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'GA_MEASUREMENT_ID');
</script>

<title>Image Editor — All Tools in One Place | MyFreeImageTool</title>
<meta name="description" content="Free online image editor. Compress, resize, convert, crop, rotate, watermark and blur images in your browser. One workspace, no signup." />
<link rel="canonical" href="https://myfreeimagetool.com/editor/" />

<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<link rel="stylesheet" href="/styles.css" />
</head>
<body>

<header class="nav">
  <div class="container nav-inner">
    <a href="/" class="brand" aria-label="MyFreeImageTool home">
      <svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true">
        <path d="M9 11l1.2-2a1 1 0 0 1 .85-.5h7.9a1 1 0 0 1 .85.5L21 11h2.5A2.5 2.5 0 0 1 26 13.5v8A2.5 2.5 0 0 1 23.5 24h-15A2.5 2.5 0 0 1 6 21.5v-8A2.5 2.5 0 0 1 8.5 11H9Z" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
        <circle cx="16" cy="17" r="3.6" fill="none" stroke="currentColor" stroke-width="1.6"/>
      </svg>
      <span class="brand-text">MyFreeImageTool</span>
    </a>
    <nav class="nav-links" aria-label="Primary">
      <a href="/#tools">Tools</a>
      <a href="/#faq">FAQ</a>
      <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode" type="button">
        <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4" fill="currentColor"/><g stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M5.6 18.4 7 17M17 7l1.4-1.4"/></g></svg>
        <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M20 14.5A8 8 0 0 1 9.5 4a8 8 0 1 0 10.5 10.5Z" fill="currentColor"/></svg>
      </button>
    </nav>
  </div>
</header>

<div class="editor-shell" id="editor-shell">
  <aside class="editor-sidebar">
    <h3>File</h3>
    <button class="tool-btn" data-tool="open" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7Z" stroke-linejoin="round"/></svg>
      Open image
    </button>

    <h3>Adjust</h3>
    <button class="tool-btn" data-tool="compress" type="button" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 9V5h4M20 9V5h-4M4 15v4h4M20 15v4h-4" stroke-linecap="round"/></svg>Compress</button>
    <button class="tool-btn" data-tool="resize" type="button" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 15l6-6M15 9h-4M15 9v4" stroke-linecap="round" stroke-linejoin="round"/></svg>Resize</button>
    <button class="tool-btn" data-tool="convert" type="button" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 8h12l-3-3M20 16H8l3 3" stroke-linecap="round" stroke-linejoin="round"/></svg>Convert</button>
    <button class="tool-btn" data-tool="filters" type="button" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="9" cy="9" r="5"/><circle cx="15" cy="15" r="5"/></svg>Filters</button>

    <h3>Edit</h3>
    <button class="tool-btn" data-tool="text" type="button" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 6V4h14v2M12 4v16M9 20h6" stroke-linecap="round" stroke-linejoin="round"/></svg>Add text</button>
    <button class="tool-btn" data-tool="crop" type="button" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2v16h16M2 6h16v16" stroke-linecap="round" stroke-linejoin="round"/></svg>Crop</button>
    <button class="tool-btn" data-tool="rotate" type="button" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12a9 9 0 1 1-3-6.7" stroke-linecap="round"/><path d="M21 4v5h-5" stroke-linecap="round" stroke-linejoin="round"/></svg>Rotate &amp; Flip</button>
    <button class="tool-btn" data-tool="watermark" type="button" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 6V4h14v2M12 4v16M9 20h6" stroke-linecap="round" stroke-linejoin="round"/></svg>Watermark</button>
    <button class="tool-btn" data-tool="blur" type="button" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="9" stroke-dasharray="2 2"/></svg>Blur background</button>

    <h3>Export</h3>
    <button class="tool-btn" data-tool="topdf" type="button" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 9h8M8 13h8M8 17h5" stroke-linecap="round"/></svg>Image to PDF</button>
    <button class="tool-btn tool-btn-accent" data-tool="download" type="button" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 4v12m0 0-5-5m5 5 5-5M5 20h14" stroke-linecap="round" stroke-linejoin="round"/></svg>Download</button>
  </aside>

  <section class="editor-viewer">
    <div class="viewer-toolbar" id="viewer-toolbar" style="display:none;">
      <div class="vt-group">
        <button class="vt-btn" id="undo-btn" type="button" aria-label="Undo" title="Undo (Ctrl+Z)" disabled>
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 7 4 12l5 5" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 12h11a5 5 0 0 1 0 10h-3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <button class="vt-btn" id="redo-btn" type="button" aria-label="Redo" title="Redo (Ctrl+Y)" disabled>
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8"><path d="m15 7 5 5-5 5" stroke-linecap="round" stroke-linejoin="round"/><path d="M20 12H9a5 5 0 0 0 0 10h3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
      <div class="vt-file" id="vt-file"></div>
      <div class="vt-group"><button class="vt-btn" id="reset-btn" type="button" title="Revert to original">Reset</button></div>
    </div>

    <div class="viewer-scroll" id="viewer-scroll">
      <div class="editor-empty" id="editor-empty">
        <label class="dropzone" id="dropzone" for="file-input">
          <svg class="dropzone-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 16V4m0 0-4 4m4-4 4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <path d="M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/>
          </svg>
          <h2>Drop an image here or click to choose</h2>
          <p>Your file never leaves your device</p>
          <input id="file-input" type="file" accept="image/*" />
        </label>
      </div>
      <div class="image-stage" id="image-stage" style="display:none;">
        <canvas id="img-canvas"></canvas>
        <div class="crop-overlay" id="crop-overlay" style="display:none;"></div>
      </div>
    </div>

    <div class="editor-actionbar" id="editor-actionbar" style="display:none;">
      <div class="ab-summary" id="ab-summary"></div>
      <button class="btn-apply" id="download-btn" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 4v12m0 0-5-5m5 5 5-5M5 20h14" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Download
      </button>
    </div>
  </section>

  <aside class="editor-inspector" id="editor-inspector">
    <h3 id="inspector-title">Get started</h3>
    <p class="hint" id="inspector-hint">Open an image to begin editing.</p>
    <div id="inspector-body"></div>
    <div class="status" role="status" style="margin-top:16px;"></div>
  </aside>
</div>

<input type="file" id="add-image-input" accept="image/*" multiple style="display:none;" />

<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
<script src="/app.js" defer></script>
<script src="/image-engine.js" defer></script>
<script src="/editor.js" defer></script>
</body>
</html>
